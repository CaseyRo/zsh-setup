repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=error]
        files: ^(install\.sh|install/.*\.sh|bootstrap\.sh|scripts/.*\.sh)$
        exclude: ^(modules/|preload_configs/|\.zshrc)

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: [--fix]

  - repo: local
    hooks:
      - id: bump-version
        name: bump-version
        entry: bash scripts/bump-version.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
