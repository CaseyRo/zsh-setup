name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (bash -n)
        run: |
          echo "::group::Syntax checking all .sh files"
          failed=0
          while IFS= read -r -d '' file; do
            if ! bash -n "$file" 2>&1; then
              echo "::error file=$file::Syntax error"
              failed=1
            fi
          done < <(find . -name '*.sh' -not -path './.git/*' -print0)
          if [[ "$failed" -eq 1 ]]; then
            echo "::error::Syntax check failed"
            exit 1
          fi
          echo "All files passed syntax check"
          echo "::endgroup::"

      - name: ShellCheck (installer scripts)
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: .
          ignore_paths: modules preload_configs .zshrc

      - name: ShellCheck (runtime modules, bash mode)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          echo "::group::Runtime modules + preload_configs"
          mapfile -t targets < <(find modules preload_configs -type f -name '*.sh' ! -name '#*')
          shellcheck --shell=bash --severity=warning "${targets[@]}"
          echo "::endgroup::"
        shell: bash
