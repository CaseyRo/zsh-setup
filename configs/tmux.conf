# ~/.tmux.conf — lean, no notifications, mosh-friendly

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"      # truecolor passthrough
set -sg escape-time 0                     # no ESC lag (vim/p10k)
set -g history-limit 50000                # scrollback (mosh has none of its own)
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g aggressive-resize on               # don't shrink to the smallest attached client
set -g focus-events on

# thin one-line bar, no CPU/mem/battery christmas tree
set -g status-style "fg=white bg=default"
set -g status-left ""
set -g status-right "#[fg=cyan]#S "
set -g window-status-format "#I:#W"
set -g window-status-current-format "#[bold]#I:#W"

# the part that kills byobu-style noise
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

# ============================================================================
# Clipboard & copy — beat tmux's line-wrap, survive the ssh hop
# ============================================================================
# Problem: tmux wraps long lines at the pane width and, by default, copies each
# visual row as its own line — so a URL or a prose paragraph pastes back broken.
# The fixes below copy to the *system* clipboard via OSC 52, which rides cmux's
# ssh transport back to Ghostty on the Mac.
#   - Works over ssh (storykeep / project workspaces).
#   - mosh filters OSC 52, so the monitoring grid won't get clipboard — expected.
#   - `-J` only undoes tmux's *display* wrap; authored hard newlines in the
#     source stay as-is (that's content, reflow it separately if needed).

set -g set-clipboard on            # tmux copies → OSC 52 → terminal/system clipboard
set -g allow-passthrough on        # let tools inside tmux push their own OSC 52 (tmux 3.3+)
set -g word-separators " "         # double-click selects a whole URL / path

# vi copy-mode; yank straight to the clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v                 send -X begin-selection
bind -T copy-mode-vi y                 send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter             send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# prefix + R — copy the ENTIRE scrollback, wrap-joined, to the clipboard.
# The "grab the whole blog" button. -J rejoins tmux's display wrap; real
# newlines in the source remain.
bind R run-shell 'tmux capture-pane -pJ -S - | tmux load-buffer -w -' \; \
       display-message 'scrollback (joined) copied to clipboard'

# prefix + u — fuzzy-pick a URL from the pane and copy it whole (needs fzf).
# Self-contained picker (no plugin/python); binding is skipped if absent.
if-shell -b '[ -x "$HOME/.config/tmux/tmux-fzf-url.sh" ]' \
  "bind u display-popup -E -w 90% -h 70% ~/.config/tmux/tmux-fzf-url.sh"
