# Starship Prompt Configuration
# https://starship.rs/config/
# Managed by zsh-setup: https://github.com/CaseyRo/zsh-setup

# Timeout for commands executed by starship (ms)
command_timeout = 1000

# Newline between prompts
add_newline = true

# Prompt format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$php\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
symbol = " "
style = "bold green"

[python]
symbol = " "
style = "bold yellow"

[rust]
symbol = " "
style = "bold red"

[golang]
symbol = " "
style = "bold cyan"

[php]
symbol = " "
style = "bold blue"

[docker_context]
symbol = " "
style = "bold blue"

[cmd_duration]
min_time = 2_000
style = "bold yellow"

[username]
style_user = "bold blue"
show_always = false

[hostname]
ssh_only = true
style = "bold green"
