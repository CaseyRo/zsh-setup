# Starship Prompt Configuration
# https://starship.rs/config/
# Managed by zsh-setup: https://github.com/CaseyRo/zsh-setup
#
# Theme: Tokyo Night + Nerd Font Symbols
# Requires: A Nerd Font enabled in your terminal

"$schema" = 'https://starship.rs/config-schema.json'

# Timeout for commands executed by starship (ms)
command_timeout = 1000

# Newline between prompts
add_newline = true

# Use the tokyo_night palette
palette = 'tokyo_night'

# --- Left Prompt ---
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$package\
$nodejs\
$python\
$rust\
$golang\
$php\
$docker_context\
$cmd_duration\
$jobs\
$line_break\
$battery\
$character"""

# --- Right Prompt (time, memory, cpu) ---
right_format = """
$memory_usage\
$time"""

# ==========================================================================
# Core
# ==========================================================================

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"
vimcmd_symbol = "[](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"
read_only = " "

[username]
style_user = "bold blue"
show_always = false

[hostname]
ssh_only = true
ssh_symbol = " "
style = "bold green"

# ==========================================================================
# Git
# ==========================================================================

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
conflicted = "="
ahead = "${count}"
behind = "${count}"
diverged = "${ahead_count}${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "${count}"
deleted = "${count}"

[git_commit]
tag_symbol = '  '

# ==========================================================================
# Languages & Tools
# ==========================================================================

[nodejs]
symbol = " "
style = "bold green"

[python]
symbol = " "
style = "bold yellow"

[rust]
symbol = " "
style = "bold peach"

[golang]
symbol = " "
style = "bold cyan"

[php]
symbol = " "
style = "bold lavender"

[package]
symbol = " "
style = "bold peach"

[docker_context]
symbol = " "
style = "bold blue"

# ==========================================================================
# System Info
# ==========================================================================

[os]
disabled = false
style = "bold fg:overlay1"

[os.symbols]
Macos = " "
Linux = " "
Ubuntu = " "
Debian = " "
Raspbian = " "
Alpine = " "
Fedora = " "
Arch = " "
Windows = " "

[battery]
full_symbol = " "
charging_symbol = " "
discharging_symbol = " "
unknown_symbol = " "
empty_symbol = " "

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

[memory_usage]
disabled = false
threshold = 75
symbol = " "
style = "bold dimmed yellow"
format = "$symbol[${ram}]($style) "

[time]
disabled = false
time_format = "%R"
style = "dimmed fg:overlay1"
format = "[ $time]($style)"

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "[ $duration]($style) "

[jobs]
symbol = " "
style = "bold blue"

# ==========================================================================
# Tokyo Night Palette
# ==========================================================================

[palettes.tokyo_night]
# Base colors
red = "#f7768e"
orange = "#ff9e64"
yellow = "#e0af68"
green = "#9ece6a"
cyan = "#7dcfff"
blue = "#7aa2f7"
purple = "#bb9af7"
magenta = "#bb9af7"
peach = "#ff9e64"
lavender = "#c0caf5"
# UI shades
text = "#a9b1d6"
overlay1 = "#565f89"
overlay0 = "#414868"
surface1 = "#343b58"
surface0 = "#24283b"
base = "#1a1b26"
